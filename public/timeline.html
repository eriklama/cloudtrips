<!DOCTYPE html>
<html lang="en" class="h-full dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timeline</title>

  <link href="/output.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="min-h-full bg-slate-950 text-slate-100 overflow-x-hidden">
<div class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-950 to-slate-900">

  <header class="border-b border-slate-800">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between gap-3">
      <h1 id="timeline-title" class="text-xl font-semibold tracking-tight">Timeline</h1>

      <div class="flex gap-2">
        <button onclick="goToTrip()"
          class="inline-flex items-center justify-center gap-2 rounded-xl border border-slate-700 bg-slate-950 px-3 py-2.5 text-sm font-medium text-slate-200 transition hover:bg-slate-800">
          <i data-lucide="notebook-pen" class="h-4 w-4"></i>
          Trip
        </button>
        <button onclick="goToCosts()"
          class="inline-flex items-center justify-center gap-2 rounded-xl border border-slate-700 bg-slate-950 px-3 py-2.5 text-sm font-medium text-slate-200 transition hover:bg-slate-800">
          <i data-lucide="badge-euro" class="h-4 w-4"></i>
          Costs
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-6 sm:py-8 pb-20 overflow-x-hidden">

    <section class="mb-4 sm:mb-6 flex flex-col gap-4 rounded-2xl border border-slate-800 bg-slate-900 p-4 sm:p-6 shadow-soft lg:flex-row lg:items-center lg:justify-between">
      <div>
        <div class="mb-2 inline-flex items-center gap-2 rounded-full bg-primary-500/10 px-3 py-1 text-xs font-semibold uppercase tracking-wide text-primary-300">
          <i data-lucide="list-tree" class="h-3.5 w-3.5"></i>
          Trip timeline
        </div>

        <h2 id="timeline-hero-title" class="text-xl sm:text-2xl font-semibold tracking-tight">
          Timeline
        </h2>

        <p class="mt-1 sm:mt-2 text-sm text-slate-400">
          Switch between the classic vertical timeline and a calendar tile overview.
        </p>
      </div>

      <div class="flex w-full flex-col gap-2 sm:w-auto sm:flex-row">
        <button
          id="btnTimelineView"
          type="button"
          onclick="switchTimelineView('timeline')"
          class="inline-flex items-center justify-center gap-2 rounded-xl border border-primary-500 bg-primary-500 px-3 py-2.5 text-sm font-medium text-white shadow-sm transition hover:bg-primary-600"
        >
          <i data-lucide="list-tree" class="h-4 w-4"></i>
          Timeline
        </button>

        <button
          id="btnCalendarView"
          type="button"
          onclick="switchTimelineView('calendar')"
          class="inline-flex items-center justify-center gap-2 rounded-xl border border-slate-700 bg-slate-950 px-3 py-2.5 text-sm font-medium text-slate-200 transition hover:bg-slate-800"
        >
          <i data-lucide="calendar-days" class="h-4 w-4"></i>
          Calendar
        </button>
      </div>
    </section>

    <section class="space-y-4">
      <div id="timeline" class="space-y-3"></div>
      <div id="calendar-view" class="hidden space-y-4"></div>
    </section>

  </main>

  <script src="/script.js" defer></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (window.lucide) {
        window.lucide.createIcons();
      }
    });
  </script>
</div>
</body>
</html>
