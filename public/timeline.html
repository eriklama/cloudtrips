<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <script>
  (function() {
    const theme = localStorage.getItem('cloudtrips_theme') || 'dark';
    document.documentElement.classList.toggle('dark', theme === 'dark');
  })();
</script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timeline</title>
  <meta name="description" content="See your trip activities in a timeline view.">

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2563eb">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/icons/favicon.ico">
  <link href="/output.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest" defer></script>
</head>

<body class="min-h-full bg-slate-300 dark:bg-slate-950 text-slate-900 dark:text-slate-100 overflow-x-hidden">
<div class="min-h-screen bg-gradient-to-br from-slate-300 via-slate-200 to-slate-300 dark:from-slate-950 dark:via-slate-950 dark:to-slate-900">

  <!-- HEADER -->
  <header class="border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between gap-3">

      <!-- Title -->
      <h1 id="timeline-title" class="text-xl font-semibold tracking-tight">
        Timeline
      </h1>

      <!-- NAV + AUTH -->
      <div class="flex items-center gap-2">

        <!-- Dynamic nav (Trip / Costs etc.) -->
        <div id="nav-actions" class="flex gap-2"></div>

        <!-- User -->
        <span id="auth-user-email"
          class="hidden sm:inline text-sm text-slate-500 dark:text-slate-400 truncate max-w-[160px]">
        </span>

        <!-- Settings -->
        <button onclick="openSettingsModal()"
          class="inline-flex items-center justify-center rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-800 transition"
          aria-label="Settings">
          <i data-lucide="settings" class="w-4 h-4"></i>
        </button>

        <!-- Logout -->
        <button id="logout-button" onclick="logout()"
          class="inline-flex items-center justify-center gap-1 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 px-3 py-2 text-sm font-medium text-slate-700 dark:text-slate-200 hover:border-slate-300 dark:hover:border-slate-600 hover:bg-slate-50 dark:hover:bg-slate-800 transition">
          <i data-lucide="log-out" class="w-4 h-4"></i>
        </button>

      </div>

    </div>
  </header>

  <!-- MAIN -->
  <main class="max-w-6xl mx-auto px-4 py-6 sm:py-8 pb-20 overflow-x-hidden">

    <!-- HERO -->
    <section class="mb-4 sm:mb-6 flex flex-col gap-4 rounded-2xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900 p-4 sm:p-6 shadow-soft lg:flex-row lg:items-center lg:justify-between">
      
      <div>
        <div class="mb-2 inline-flex items-center gap-2 rounded-full bg-primary-500/10 px-3 py-1 text-xs font-semibold uppercase tracking-wide text-primary-300">
          <i data-lucide="list-tree" class="h-3.5 w-3.5"></i>
          Trip timeline
        </div>

        <h2 id="timeline-hero-title" class="text-xl sm:text-2xl font-semibold tracking-tight">
          Timeline
        </h2>

        <p class="mt-1 sm:mt-2 text-sm text-slate-500 dark:text-slate-400">
          Switch between the classic vertical timeline and a calendar tile overview.
        </p>
      </div>

      <!-- VIEW SWITCH -->
      <div class="flex w-full flex-col gap-2 sm:w-auto sm:flex-row">
        
        <button
          id="btnTimelineView"
          type="button"
          onclick="switchTimelineView('timeline')"
          class="inline-flex items-center justify-center gap-2 rounded-xl bg-primary-600 px-4 py-2.5 text-sm font-medium text-white hover:bg-primary-500 transition"
        >
          <i data-lucide="list-tree" class="h-4 w-4"></i>
          Timeline
        </button>

        <button
          id="btnCalendarView"
          type="button"
          onclick="switchTimelineView('calendar')"
          class="inline-flex items-center justify-center gap-2 rounded-xl border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 px-4 py-2.5 text-sm font-medium text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 transition"
        >
          <i data-lucide="calendar-days" class="h-4 w-4"></i>
          Calendar
        </button>

        <button
          id="btnJumpToday"
          type="button"
          onclick="jumpToToday()"
          class="inline-flex items-center justify-center gap-2 rounded-xl border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 px-4 py-2.5 text-sm font-medium text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 transition"
        >
          <i data-lucide="calendar-check" class="h-4 w-4"></i>
          Today
        </button>

      </div>

    </section>

    <!-- CONTENT -->
    <section class="space-y-4">

      <!-- Timeline view -->
      <div id="timeline" class="space-y-3"></div>

      <!-- Calendar view -->
      <div id="calendar-view" class="hidden space-y-4"></div>

    </section>

  </main>

</div>

<script src="/state.js"></script>
<script src="/helpers.js"></script>
<script src="/ui.js"></script>
<script src="/auth.js"></script>
<script src="/api.js"></script>
<script src="/trips.js"></script>
<script src="/activities.js"></script>
<script src="/init.js"></script>

</body>
</html>
