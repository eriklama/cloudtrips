<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trip Costs</title>

  <script>
    tailwind = {
      config: {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: {
                500: '#6366f1'
              }
            }
          }
        }
      }
    };
  </script>

  <link href="/styles.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="min-h-full bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 overflow-x-hidden">

<div class="min-h-screen bg-gradient-to-br from-slate-50 via-white to-primary-50 dark:from-slate-950 dark:to-slate-900">

  <div class="px-4 sm:px-6 max-w-4xl mx-auto py-6">

    <!-- HEADER -->
    <div class="flex flex-col gap-4 mb-6">

      <div class="flex items-center justify-between">
        <h1 id="costs-title" class="text-xl font-semibold">
          Loading costs...
        </h1>

        <a href="/" class="text-sm text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200">
          Back to Trips
        </a>
      </div>

      <!-- NAV -->
      <div class="flex gap-2">
        <a id="trip-link"
           class="flex-1 text-center px-4 py-2 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-sm">
          Trip
        </a>
        <a id="timeline-link"
           class="flex-1 text-center px-4 py-2 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-sm">
          Timeline
        </a>
      </div>

    </div>

    <!-- TOTAL -->
    <div class="mb-6">
      <h2 class="text-lg font-semibold mb-3">Total</h2>

      <!-- ONLY CHANGE: flex-wrap -->
      <div id="cost-summary" class="flex flex-wrap gap-3">
        <!-- injected -->
      </div>
    </div>

    <!-- BY TYPE -->
    <div class="mb-6">
      <div id="cost-by-type" class="space-y-3">
        <!-- injected -->
      </div>
    </div>

    <!-- DETAILED -->
    <div>
      <h2 class="text-lg font-semibold mb-3">Detailed costs</h2>

      <!-- ONLY CHANGE: no overflow issues -->
      <div id="cost-table" class="space-y-3">
        <!-- injected -->
      </div>
    </div>

  </div>
</div>

<script src="/script.js" defer></script>

<script>
document.addEventListener('DOMContentLoaded', () => {
  lucide.createIcons();
});
</script>

</body>
</html>
