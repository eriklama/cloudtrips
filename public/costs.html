<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trip Costs</title>

  <script>
    tailwind = {
      config: {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: {
                50: '#eef2ff',
                100: '#e0e7ff',
                200: '#c7d2fe',
                300: '#a5b4fc',
                400: '#818cf8',
                500: '#6366f1',
                600: '#4f46e5',
                700: '#4338ca',
                800: '#3730a3',
                900: '#312e81'
              }
            },
            boxShadow: {
              soft: '0 10px 30px rgba(2, 6, 23, 0.08)'
            }
          }
        }
      }
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-full bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 transition-colors duration-200">
  <div class="min-h-screen bg-gradient-to-br from-slate-50 via-white to-primary-50 dark:from-slate-950 dark:via-slate-950 dark:to-slate-900">
    <header class="sticky top-0 z-20 border-b border-slate-200/70 bg-white/80 backdrop-blur dark:border-slate-800 dark:bg-slate-950/80">
      <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
        <div class="flex items-center gap-3">
          <a href="/" class="inline-flex h-11 w-11 items-center justify-center rounded-2xl bg-primary-600 text-white shadow-soft">
            <i data-lucide="plane" class="h-5 w-5"></i>
          </a>
          <div>
            <h1 id="costs-title" class="text-xl font-semibold tracking-tight">Costs</h1>
            <p class="text-sm text-slate-500 dark:text-slate-400">See totals by type and item</p>
          </div>
        </div>

        <div class="flex items-center gap-2">
          <button
            id="theme-toggle"
            type="button"
            class="inline-flex items-center gap-2 rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm font-medium text-slate-700 shadow-sm hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-200 dark:hover:bg-slate-800"
          >
            <i data-lucide="moon-star" class="h-4 w-4"></i>
            <span>Theme</span>
          </button>
        </div>
      </div>
    </header>

    <main class="mx-auto max-w-6xl px-4 py-8 sm:px-6 lg:px-8">
      <section class="mb-6 flex flex-col gap-4 rounded-3xl border border-slate-200 bg-white p-6 shadow-soft dark:border-slate-800 dark:bg-slate-900 lg:flex-row lg:items-center lg:justify-between">
        <div>
          <div class="mb-2 inline-flex items-center gap-2 rounded-full bg-primary-50 px-3 py-1 text-xs font-semibold uppercase tracking-wide text-primary-700 dark:bg-primary-500/10 dark:text-primary-300">
            <i data-lucide="badge-euro" class="h-3.5 w-3.5"></i>
            Trip costs
          </div>
          <h2 id="costs-hero-title" class="text-2xl font-semibold tracking-tight sm:text-3xl">Costs</h2>
          <p class="mt-2 text-slate-600 dark:text-slate-400">Track total spend and cost breakdown by activity type.</p>
        </div>

        <div class="flex flex-wrap gap-2">
          <button onclick="goToTrip()" class="inline-flex items-center gap-2 rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm font-medium text-slate-700 hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-950 dark:text-slate-200 dark:hover:bg-slate-800">
            <i data-lucide="notebook-pen" class="h-4 w-4"></i>
            Trip
          </button>
          <button onclick="goToTimeline()" class="inline-flex items-center gap-2 rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm font-medium text-slate-700 hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-950 dark:text-slate-200 dark:hover:bg-slate-800">
            <i data-lucide="list-tree" class="h-4 w-4"></i>
            Timeline
          </button>
        </div>
      </section>

      <section class="mb-6 grid gap-4 md:grid-cols-3">
        <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-soft dark:border-slate-800 dark:bg-slate-900">
          <div class="mb-2 flex items-center gap-2 text-slate-500 dark:text-slate-400">
            <i data-lucide="receipt" class="h-4 w-4"></i>
            <span class="text-sm">Items</span>
          </div>
          <div id="cost-items-count" class="text-3xl font-semibold tracking-tight">0</div>
        </div>

        <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-soft dark:border-slate-800 dark:bg-slate-900">
          <div class="mb-2 flex items-center gap-2 text-slate-500 dark:text-slate-400">
            <i data-lucide="shapes" class="h-4 w-4"></i>
            <span class="text-sm">Categories</span>
          </div>
          <div id="cost-categories-count" class="text-3xl font-semibold tracking-tight">0</div>
        </div>

        <div class="rounded-3xl border border-primary-200 bg-primary-50 p-6 shadow-soft dark:border-primary-500/20 dark:bg-primary-500/10">
          <div class="mb-2 flex items-center gap-2 text-primary-700 dark:text-primary-300">
            <i data-lucide="wallet-cards" class="h-4 w-4"></i>
            <span class="text-sm">Total</span>
          </div>
          <div id="totalCost" class="text-3xl font-semibold tracking-tight text-primary-800 dark:text-primary-200">€0.00</div>
        </div>
      </section>

      <section class="grid gap-6 xl:grid-cols-[0.85fr_1.15fr]">
        <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-soft dark:border-slate-800 dark:bg-slate-900">
          <div class="mb-4 flex items-center gap-2">
            <i data-lucide="pie-chart" class="h-5 w-5 text-primary-600 dark:text-primary-400"></i>
            <h3 class="text-lg font-semibold">By type</h3>
          </div>
          <div id="cost-summary" class="space-y-3"></div>
        </div>

        <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-soft dark:border-slate-800 dark:bg-slate-900">
          <div class="mb-4 flex items-center gap-2">
            <i data-lucide="table-properties" class="h-5 w-5 text-primary-600 dark:text-primary-400"></i>
            <h3 class="text-lg font-semibold">Detailed costs</h3>
          </div>
          <div class="overflow-x-auto">
            <table class="min-w-full border-separate border-spacing-y-2">
              <thead>
                <tr class="text-left text-sm text-slate-500 dark:text-slate-400">
                  <th class="px-3 py-2 font-medium">Activity</th>
                  <th class="px-3 py-2 font-medium">Type</th>
                  <th class="px-3 py-2 font-medium">Start</th>
                  <th class="px-3 py-2 font-medium text-right">Cost</th>
                </tr>
              </thead>
              <tbody id="cost-table"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="/script.js" defer></script>
</body>
</html>
