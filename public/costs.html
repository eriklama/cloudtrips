<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trip Costs</title>

  <script>
    tailwind = {
      config: {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: {
                500: '#6366f1'
              }
            }
          }
        }
      }
    };
  </script>

  <link href="/styles.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="min-h-full bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">
<div class="min-h-screen bg-gradient-to-br from-slate-50 via-white to-primary-50 dark:from-slate-950 dark:to-slate-900">

<header class="border-b border-slate-200 dark:border-slate-800">
  <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
    <h1 id="costs-title" class="text-xl font-semibold">Costs</h1>
  </div>
</header>

<main class="max-w-6xl mx-auto px-4 py-8">

<!-- HERO -->
<section class="mb-6 rounded-3xl border border-slate-200 bg-white p-6 dark:border-slate-800 dark:bg-slate-900">
  <h2 id="costs-hero-title" class="text-2xl font-semibold">Costs</h2>
</section>

<!-- MAIN GRID -->
<section class="grid gap-6 xl:grid-cols-[0.7fr_1.3fr]">

  <!-- BY TYPE -->
  <div class="rounded-3xl border border-slate-200 bg-white p-5 dark:border-slate-800 dark:bg-slate-900">

    <!-- HEADER WITH TOTAL + KM -->
    <div class="flex justify-between items-center mb-4">

  <!-- LEFT: TOTAL LABEL (same size as previous title) -->
  <h3 class="text-lg font-semibold">Total</h3>

  <!-- RIGHT: VALUES -->
  <div class="text-right">
    <div id="totalCost" class="text-lg font-semibold"></div>
    <div id="totalKm" class="text-xs text-slate-500"></div>
  </div>

</div>

    <div id="cost-summary" class="space-y-2"></div>
  </div>

  <!-- TABLE -->
  <div class="rounded-3xl border border-slate-200 bg-white p-5 dark:border-slate-800 dark:bg-slate-900">
    <h3 class="text-lg font-semibold mb-4">Detailed costs</h3>

    <div class="overflow-x-auto">
      <table class="min-w-full border-separate border-spacing-y-2">
        <thead>
          <tr class="text-left text-sm text-slate-500 dark:text-slate-400">
            <th class="px-3 py-2">Activity</th>
            <th class="px-3 py-2">Type</th>
            <th class="px-3 py-2">Start</th>
            <th class="px-3 py-2 text-right">Cost</th>
            <th class="px-3 py-2 text-right">Distance</th>
          </tr>
        </thead>
        <tbody id="cost-table"></tbody>
      </table>
    </div>
  </div>

</section>
</main>

<script src="/script.js" defer></script>
</div>
</body>
</html>
