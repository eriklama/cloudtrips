<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trip Costs</title>

  <script>
    tailwind = {
      config: {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: {
                500: '#6366f1'
              }
            }
          }
        }
      }
    };
  </script>

  <link href="/styles.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="min-h-full bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">
<div class="min-h-screen bg-gradient-to-br from-slate-50 via-white to-primary-50 dark:from-slate-950 dark:to-slate-900">

<header class="border-b border-slate-200 dark:border-slate-800">
  <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
    <h1 id="costs-title" class="text-xl font-semibold">Costs</h1>
  </div>
</header>

<main class="max-w-6xl mx-auto px-4 py-8">

<!-- HERO -->
<section class="mb-6 flex flex-col gap-4 rounded-3xl border border-slate-200 bg-white p-6 shadow-soft dark:border-slate-800 dark:bg-slate-900 lg:flex-row lg:items-center lg:justify-between">

  <!-- LEFT -->
  <div>
    <div class="mb-2 inline-flex items-center gap-2 rounded-full bg-primary-50 px-3 py-1 text-xs font-semibold uppercase tracking-wide text-primary-700 dark:bg-primary-500/10 dark:text-primary-300">
      <i data-lucide="badge-euro" class="h-3.5 w-3.5"></i>
      Trip costs
    </div>

    <h2 id="costs-hero-title" class="text-2xl font-semibold tracking-tight sm:text-3xl">
      Costs
    </h2>

    <p class="mt-2 text-slate-600 dark:text-slate-400">
      Track total spend and cost breakdown by activity type.
    </p>
  </div>

  <!-- RIGHT: NAVIGATION -->
  <div class="flex flex-wrap gap-2">

    <button onclick="goToTrip()"
      class="inline-flex items-center gap-2 rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm font-medium text-slate-700 hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-950 dark:text-slate-200 dark:hover:bg-slate-800">
      <i data-lucide="notebook-pen" class="h-4 w-4"></i>
      Trip
    </button>

    <button onclick="goToTimeline()"
      class="inline-flex items-center gap-2 rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm font-medium text-slate-700 hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-950 dark:text-slate-200 dark:hover:bg-slate-800">
      <i data-lucide="list-tree" class="h-4 w-4"></i>
      Timeline
    </button>

  </div>

</section>

<!-- MAIN GRID -->
<section class="grid gap-6 xl:grid-cols-[0.7fr_1.3fr]">

  <!-- SUMMARY -->
  <div class="rounded-3xl border border-slate-200 bg-white p-5 dark:border-slate-800 dark:bg-slate-900">

    <!-- HEADER -->
    <div class="flex justify-between items-center mb-4">
      <div class="text-lg font-semibold">
        Total
      </div>

      <div class="text-lg font-semibold">
        <span id="totalCost"></span>
        <span class="mx-2 opacity-50">·</span>
        <span id="totalKm"></span>
      </div>
    </div>

    <!-- SUMMARY LIST -->
    <div id="cost-summary" class="space-y-2"></div>

  </div>

  <!-- TABLE -->
  <div class="rounded-3xl border border-slate-200 bg-white p-5 dark:border-slate-800 dark:bg-slate-900">
    <h3 class="text-lg font-semibold mb-4">Detailed costs</h3>

    <div class="overflow-x-auto">
      <table class="min-w-full border-separate border-spacing-y-2">
        <thead>
          <tr class="text-left text-sm text-slate-500 dark:text-slate-400">
            <th class="px-3 py-2">Activity</th>
            <th class="px-3 py-2">Type</th>
            <th class="px-3 py-2">Start</th>
            <th class="px-3 py-2 text-right">Cost</th>
            <th class="px-3 py-2 text-right">Distance</th>
          </tr>
        </thead>
        <tbody id="cost-table"></tbody>
      </table>
    </div>
  </div>

</section>
</main>

<script src="/script.js" defer></script>
</div>
</body>
</html>
