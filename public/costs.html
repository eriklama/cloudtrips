<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trip Costs</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="page compact-stack">
    <div class="topbar">
      <a class="btn btn-secondary" href="/">← Back to Trips</a>
      <div class="section-actions">
        <a class="btn btn-secondary" id="costs-trip-link" href="#">Trip</a>
        <a class="btn" id="costs-timeline-link" href="#">Timeline</a>
      </div>
    </div>

    <div class="section-header">
      <h1 id="costs-title">Trip Costs</h1>
    </div>

    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Type</th>
            <th>Location</th>
            <th>Start</th>
            <th>Cost</th>
          </tr>
        </thead>
        <tbody id="cost-table"></tbody>
        <tfoot>
          <tr class="total-row">
            <td colspan="3">Total</td>
            <td><span id="total">0.00</span> €</td>
          </tr>
        </tfoot>
      </table>
    </div>
  </div>

  <script src="/script.js" defer></script>
</body>
</html>
