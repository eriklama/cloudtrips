<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Costs</title>

  <link href="/styles.css" rel="stylesheet">
</head>

<body class="min-h-full bg-slate-950 text-slate-200">
<div class="min-h-screen">

  <header class="border-b border-slate-800">
    <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-lg font-semibold">Costs</h1>

      <div class="flex gap-2">
        <button onclick="goToTrip()" class="text-sm px-3 py-2 bg-slate-800 rounded-xl">Trip</button>
        <button onclick="goToTimeline()" class="text-sm px-3 py-2 bg-slate-800 rounded-xl">Timeline</button>
      </div>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-4 space-y-4 pb-20">

    <div id="cost-summary" class="space-y-2"></div>

    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <tbody id="cost-table"></tbody>
      </table>
    </div>

  </main>

</div>

<script src="/script.js" defer></script>
</body>
</html>
