<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trip Costs</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="page">
    <div class="topbar">
      <a class="btn btn-secondary" href="/index.html"><span>←</span> Back to Trips</a>
    </div>

    <h1 id="costs-title">Trip Costs</h1>

    <div class="trip-nav">
      <a id="costs-trip-link" class="btn" href="#">Trip</a>
      <a id="costs-timeline-link" class="btn" href="#">Timeline</a>
    </div>

    <table>
      <thead>
        <tr>
          <th>Type</th>
          <th>Location</th>
          <th>Start</th>
          <th>Cost</th>
        </tr>
      </thead>
      <tbody id="cost-table"></tbody>
      <tfoot>
        <tr class="total-row">
          <td colspan="3">Total</td>
          <td><span id="total">0.00</span> €</td>
        </tr>
      </tfoot>
    </table>
  </div>

  <script src="/script.js"></script>
</body>
</html>
