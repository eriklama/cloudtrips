<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <script>
  (function() {
    const theme = localStorage.getItem('cloudtrips_theme') || 'dark';
    document.documentElement.classList.toggle('dark', theme === 'dark');
  })();
</script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/icons/favicon.ico">
  <title>Reset password · CloudTrips</title>
  <link href="/output.css" rel="stylesheet" />
</head>
<body class="min-h-full bg-white dark:bg-slate-950 text-slate-900 dark:text-slate-100">
  <div class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md rounded-2xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/80 p-6 shadow-2xl">

      <h1 class="text-2xl font-semibold tracking-tight">Set new password</h1>
      <p class="mt-2 text-sm text-slate-500 dark:text-slate-500 dark:text-slate-400">Choose a new password for your account.</p>

      <form id="reset-form" class="mt-6 space-y-4">
        <div>
          <label class="mb-2 block text-sm text-slate-600 dark:text-slate-300">New password</label>
          <input
            name="password"
            type="password"
            autocomplete="new-password"
            required
            class="w-full rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 px-4 py-3 text-slate-900 dark:text-slate-100 outline-none placeholder:text-slate-500 dark:text-slate-500 focus:border-indigo-500"
            placeholder="At least 8 characters"
          />
        </div>

        <div>
          <label class="mb-2 block text-sm text-slate-600 dark:text-slate-300">Confirm new password</label>
          <input
            name="confirmPassword"
            type="password"
            autocomplete="new-password"
            required
            class="w-full rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 px-4 py-3 text-slate-900 dark:text-slate-100 outline-none placeholder:text-slate-500 dark:text-slate-500 focus:border-indigo-500"
            placeholder="Repeat password"
          />
        </div>

        <div id="auth-error" class="min-h-[1.25rem] text-sm text-rose-400"></div>

        <button
          type="submit"
          class="inline-flex w-full items-center justify-center rounded-xl bg-indigo-600 px-4 py-3 font-medium text-white transition hover:bg-indigo-500 disabled:opacity-60"
        >
          Set new password
        </button>
      </form>

      <p class="mt-5 text-sm text-slate-500 dark:text-slate-500 dark:text-slate-400">
        <a href="/login.html" class="text-indigo-400 hover:text-indigo-300">Back to login</a>
      </p>

    </div>
  </div>

  <script>
    // Check token exists in URL
    const token = new URLSearchParams(window.location.search).get('token');
    if (!token) {
      document.getElementById('auth-error').textContent = 'Invalid or missing reset token.';
      document.querySelector('button[type="submit"]').disabled = true;
    }

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.currentTarget;
      const password = form.querySelector('input[name="password"]').value;
      const confirmPassword = form.querySelector('input[name="confirmPassword"]').value;
      const errorBox = document.getElementById('auth-error');
      const submitBtn = form.querySelector('button[type="submit"]');

      errorBox.textContent = '';

      if (password !== confirmPassword) {
        errorBox.textContent = 'Passwords do not match.';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Saving...';

      try {
        const res = await fetch('/api/resetPassword', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });

        const data = await res.json();

        if (!res.ok) {
          errorBox.textContent = data.error || 'Something went wrong.';
          return;
        }

        // Success — redirect to login
        window.location.href = '/login.html?reset=1';
      } catch {
        errorBox.textContent = 'Network error. Please try again.';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Set new password';
      }
    });
  </script>

  <button onclick="toggleTheme()"
  data-theme-toggle
  class="fixed top-4 right-4 inline-flex items-center justify-center rounded-xl border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 p-2 text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 transition">
  <i data-lucide="sun" class="h-4 w-4"></i>
</button>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="/helpers.js"></script>
<script>
  // Set correct icon on load
  document.querySelector('[data-theme-toggle] i').setAttribute(
    'data-lucide', getTheme() === 'dark' ? 'sun' : 'moon'
  );
  if (window.lucide) lucide.createIcons();
</script>

</body>
</html>
