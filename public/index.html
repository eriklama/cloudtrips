<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <script>
    (function() {
      const theme = localStorage.getItem('cloudtrips_theme') || 'dark';
      document.documentElement.classList.toggle('dark', theme === 'dark');
    })();
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Trips</title>

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2563eb">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/icons/favicon.ico">
  <link href="/output.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="min-h-full bg-slate-300 dark:bg-slate-950 text-slate-900 dark:text-slate-100 overflow-x-hidden">
<div class="min-h-screen bg-gradient-to-br from-slate-300 via-slate-200 to-slate-300 dark:from-slate-950 dark:via-slate-950 dark:to-slate-900">

  <!-- HEADER -->
  <header class="border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950">
    <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between gap-3">

      <h1 class="text-xl font-semibold tracking-tight">
        My Trips
      </h1>

      <!-- Auth section -->
      <div class="flex items-center gap-3">
        <span id="auth-user-email"
          class="hidden sm:inline text-sm text-slate-500 dark:text-slate-400 truncate max-w-[180px]">
        </span>

        <button onclick="toggleTheme()" data-theme-toggle
          class="inline-flex items-center justify-center rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-800 transition"
          aria-label="Toggle theme">
          <i data-lucide="sun" class="w-4 h-4"></i>
        </button>

        <!-- Settings -->
        <button onclick="openSettingsModal()"
          class="inline-flex items-center justify-center rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-800 transition"
          aria-label="Settings">
          <i data-lucide="settings" class="w-4 h-4"></i>
        </button>

        <button id="logout-button" onclick="logout()"
          class="inline-flex items-center justify-center gap-1 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 px-3 py-2 text-sm font-medium text-slate-700 dark:text-slate-200 hover:border-slate-300 dark:hover:border-slate-600 hover:bg-slate-50 dark:hover:bg-slate-800 transition">
          <i data-lucide="log-out" class="w-4 h-4"></i>
          Logout
        </button>
      </div>

    </div>
  </header>

  <!-- MAIN -->
  <main class="max-w-5xl mx-auto px-4 py-5 pb-24">

    <!-- Quick stats strip -->
    <div id="index-stats" class="hidden mb-4 grid grid-cols-2 sm:grid-cols-4 gap-3">
    </div>

    <!-- Search + Filter -->
    <div class="mb-4 flex flex-col sm:flex-row gap-2">
      <div class="relative flex-1">
        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-slate-400 pointer-events-none"></i>
        <input id="tripSearch"
          placeholder="Search trips..."
          oninput="filterTrips()"
          class="w-full rounded-2xl border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 pl-9 pr-4 py-3 text-sm text-slate-900 dark:text-white placeholder-slate-400 outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 transition" />
      </div>

      <select id="tripYearFilter"
        onchange="filterTrips()"
        class="rounded-2xl border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 px-4 py-3 text-sm text-slate-900 dark:text-white outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 transition">
        <option value="">All years</option>
      </select>
    </div>

    <!-- Add Trip -->
    <div class="mb-6 flex flex-col sm:flex-row gap-2">
      <input id="newTripName"
        placeholder="Trip name"
        class="flex-1 rounded-2xl border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 px-4 py-3 text-sm text-slate-900 dark:text-white placeholder-slate-400 outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 transition" />

      <button onclick="addTrip()"
        class="inline-flex items-center justify-center gap-2 rounded-2xl bg-primary-600 px-4 py-3 text-sm font-medium text-white hover:bg-primary-500 active:scale-[0.98] transition">
        <i data-lucide="plus" class="w-4 h-4"></i>
        Add
      </button>
    </div>

    <!-- Trips -->
    <div id="trip-list"
      class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4">
    </div>

  </main>

</div>

<script src="/state.js"></script>
<script src="/helpers.js"></script>
<script src="/ui.js"></script>
<script src="/auth.js"></script>
<script src="/api.js"></script>
<script src="/trips.js"></script>
<script src="/activities.js"></script>
<script src="/init.js"></script>

<script>
  (function() {
    const btn = document.querySelector('[data-theme-toggle] i');
    if (btn) {
      btn.setAttribute('data-lucide',
        localStorage.getItem('cloudtrips_theme') === 'light' ? 'moon' : 'sun');
      if (window.lucide) lucide.createIcons();
    }
  })();
</script>
</body>
</html>
