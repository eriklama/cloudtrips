<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trips</title>

  <link href="/styles.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="min-h-full bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">
<div class="min-h-screen bg-gradient-to-br from-slate-50 via-white to-primary-50 dark:from-slate-950 dark:to-slate-900">

  <header class="border-b border-slate-200 bg-white dark:border-slate-800 dark:bg-slate-950">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
      <h1 class="text-lg font-semibold">My Trips</h1>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-4 pb-20">

    <!-- Add Trip -->
    <div class="mb-4 flex gap-2 flex-col sm:flex-row">
      <input id="newTripName" placeholder="Trip name"
        class="flex-1 rounded-xl border px-3 py-2.5 text-sm" />
      <button onclick="addTrip()"
        class="rounded-xl bg-primary-600 text-white px-3 py-2.5 text-sm">
        Add
      </button>
    </div>

    <!-- Trips -->
    <div id="trip-list"
      class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4">
    </div>

  </main>

</div>

<script src="/script.js" defer></script>
</body>
</html>
