<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloudTrips</title>

  <script>
    tailwind = {
      config: {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: {
                50: '#eef2ff',
                100: '#e0e7ff',
                200: '#c7d2fe',
                300: '#a5b4fc',
                400: '#818cf8',
                500: '#6366f1',
                600: '#4f46e5',
                700: '#4338ca',
                800: '#3730a3',
                900: '#312e81'
              }
            },
            boxShadow: {
              soft: '0 10px 30px rgba(2, 6, 23, 0.08)'
            }
          }
        }
      }
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-full bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 transition-colors duration-200">
  <div class="min-h-screen bg-gradient-to-br from-slate-50 via-white to-primary-50 dark:from-slate-950 dark:via-slate-950 dark:to-slate-900">
    <header class="sticky top-0 z-20 border-b border-slate-200/70 bg-white/80 backdrop-blur dark:border-slate-800 dark:bg-slate-950/80">
      <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
        <div class="flex items-center gap-3">
          <div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-primary-600 text-white shadow-soft">
            <i data-lucide="plane" class="h-5 w-5"></i>
          </div>
          <div>
            <h1 class="text-xl font-semibold tracking-tight">CloudTrips</h1>
            <p class="text-sm text-slate-500 dark:text-slate-400">Plan trips beautifully</p>
          </div>
        </div>

        <div class="flex items-center gap-2">
          <button
            id="theme-toggle"
            type="button"
            class="inline-flex items-center gap-2 rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm font-medium text-slate-700 shadow-sm hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-200 dark:hover:bg-slate-800"
          >
            <i data-lucide="moon-star" class="h-4 w-4"></i>
            <span>Theme</span>
          </button>
        </div>
      </div>
    </header>

    <main class="mx-auto max-w-6xl px-4 py-8 sm:px-6 lg:px-8">
      <section class="mb-8 grid gap-4 lg:grid-cols-[1.5fr_1fr]">
        <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-soft dark:border-slate-800 dark:bg-slate-900">
          <div class="flex items-start justify-between gap-4">
            <div>
              <p class="mb-2 inline-flex items-center gap-2 rounded-full bg-primary-50 px-3 py-1 text-xs font-semibold uppercase tracking-wide text-primary-700 dark:bg-primary-500/10 dark:text-primary-300">
                <i data-lucide="sparkles" class="h-3.5 w-3.5"></i>
                Travel planner
              </p>
              <h2 class="text-3xl font-semibold tracking-tight sm:text-4xl">Your trips, cleaner and cooler.</h2>
              <p class="mt-3 max-w-2xl text-slate-600 dark:text-slate-400">
                Keep all your trips, plans, transport, stays, notes, and costs in one place with a cleaner modern layout.
              </p>
            </div>
            <div class="hidden rounded-2xl bg-slate-100 p-4 dark:bg-slate-800 sm:block">
              <i data-lucide="map" class="h-10 w-10 text-primary-600 dark:text-primary-400"></i>
            </div>
          </div>
        </div>

        <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-soft dark:border-slate-800 dark:bg-slate-900">
          <div class="mb-4 flex items-center gap-2">
            <i data-lucide="plus-circle" class="h-5 w-5 text-primary-600 dark:text-primary-400"></i>
            <h3 class="text-lg font-semibold">Add trip</h3>
          </div>

          <div class="space-y-3">
            <div>
              <label for="newTripName" class="mb-1 block text-sm font-medium text-slate-700 dark:text-slate-300">Trip name</label>
              <input
                id="newTripName"
                type="text"
                placeholder="e.g. Iceland Summer 2026"
                class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 outline-none ring-0 transition placeholder:text-slate-400 focus:border-primary-500 focus:ring-4 focus:ring-primary-100 dark:border-slate-700 dark:bg-slate-950 dark:placeholder:text-slate-500 dark:focus:ring-primary-500/20"
              />
            </div>

            <button
              type="button"
              onclick="addTrip()"
              class="inline-flex w-full items-center justify-center gap-2 rounded-2xl bg-primary-600 px-4 py-3 font-medium text-white shadow-sm transition hover:bg-primary-700"
            >
              <i data-lucide="plus" class="h-4 w-4"></i>
              Create trip
            </button>
          </div>
        </div>
      </section>

      <section>
        <div class="mb-4 flex items-center justify-between">
          <div>
            <h3 class="text-xl font-semibold tracking-tight">My trips</h3>
            <p class="text-sm text-slate-500 dark:text-slate-400">Open, rename, or delete any trip.</p>
          </div>
        </div>

        <div id="trip-list" class="grid gap-4 md:grid-cols-2 xl:grid-cols-3"></div>
      </section>
    </main>
  </div>

  <script src="/script.js" defer></script>
</body>
</html>
