<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trips</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="page compact-stack">
    <div class="section-header">
      <h1>My Trips</h1>
    </div>

    <div class="card">
      <div class="section-header">
        <h2>Add Trip</h2>
      </div>
      <div class="form-grid">
        <input id="newTripName" placeholder="Trip Name" />
        <input id="newTripPin" type="password" placeholder="Trip PIN" />
        <button type="button" onclick="addTrip()">Add Trip</button>
      </div>
    </div>

    <div class="section-header">
      <h2>All Trips</h2>
    </div>

    <div id="trip-list"></div>
  </div>

  <script src="/script.js" defer></script>
</body>
</html>
