<!DOCTYPE html>
<html lang="en" class="h-full dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Trips</title>

  <link href="/output.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="min-h-full bg-slate-950 text-slate-100">
<div class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-950 to-slate-900">

  <header class="border-b border-slate-800">
    <div class="max-w-5xl mx-auto px-4 py-4">
      <h1 class="text-xl font-semibold">My Trips</h1>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-4 pb-20">

    <!-- Add Trip -->
    <div class="mb-6 flex flex-col sm:flex-row gap-2">
      <input id="newTripName"
        placeholder="Trip name"
        class="flex-1 rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-sm text-white placeholder-slate-400" />

      <button onclick="addTrip()"
        class="rounded-2xl bg-primary-600 px-4 py-3 text-sm text-white hover:bg-primary-500">
        Add
      </button>
    </div>

    <!-- Trips -->
    <div id="trip-list"
      class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4">
    </div>

  </main>

</div>

<script src="/script.js" defer></script>
</body>
</html>
