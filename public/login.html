<!DOCTYPE html>
<html lang="en" class="h-full dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link href="/output.css" rel="stylesheet">
</head>

<body class="min-h-full bg-slate-950 text-slate-100 flex items-center justify-center">

  <div class="w-full max-w-sm bg-slate-900 p-6 rounded-2xl shadow-lg">

    <!-- HEADER -->
    <h1 class="text-xl font-semibold mb-1">Welcome back</h1>
    <p class="text-sm text-slate-400 mb-5">
      Log in to your private trips workspace.
    </p>

    <!-- EMAIL -->
    <label class="text-sm text-slate-300">Email</label>
    <input id="email" placeholder="you@example.com"
      class="w-full mt-1 mb-4 px-3 py-2 bg-slate-800 rounded outline-none focus:ring-2 focus:ring-primary-500" />

    <!-- PASSWORD -->
    <label class="text-sm text-slate-300">Password</label>
    <input id="password" type="password" placeholder="Your password"
      class="w-full mt-1 mb-6 px-3 py-2 bg-slate-800 rounded outline-none focus:ring-2 focus:ring-primary-500" />

    <!-- LOGIN BUTTON -->
    <button onclick="login()"
      class="w-full bg-primary-500 hover:bg-primary-600 transition py-2 rounded-xl font-medium">
      Log in
    </button>

    <!-- SIGNUP LINK -->
    <p class="text-sm text-slate-400 mt-4 text-center">
      Don’t you have an account?
      <a href="/signup.html" class="text-primary-400 hover:underline">
        Create one...
      </a>
    </p>

  </div>

<script>
async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.error || 'Login failed');
      return;
    }

    // ✅ STORE TOKEN
    localStorage.setItem('cloudtrips_auth_token', data.token);
    localStorage.setItem('cloudtrips_auth_user', JSON.stringify(data.user));

    // ✅ DEBUG (important)
    console.log('TOKEN SAVED:', localStorage.getItem('cloudtrips_auth_token'));

    // ✅ SMALL DELAY (prevents race condition)
    setTimeout(() => {
      window.location.href = '/';
    }, 50);

  } catch (err) {
    console.error('Login error:', err);
    alert('Network error');
  }
}
</script>

</body>
</html>
