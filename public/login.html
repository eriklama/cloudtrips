<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <script>
  (function() {
    const theme = localStorage.getItem('cloudtrips_theme') || 'dark';
    document.documentElement.classList.toggle('dark', theme === 'dark');
  })();
</script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link href="/output.css" rel="stylesheet">
</head>

<body class="min-h-full bg-white dark:bg-slate-950 text-slate-900 dark:text-slate-100 flex items-center justify-center">

  <div class="w-full max-w-sm bg-slate-50 dark:bg-slate-900 p-6 rounded-2xl shadow-lg">

    <!-- HEADER -->
    <h1 class="text-xl font-semibold mb-1">Welcome back</h1>
    <p class="text-sm text-slate-500 dark:text-slate-500 dark:text-slate-400 mb-5">
      Log in to your private trips workspace.
    </p>

    <!-- SUCCESS MESSAGE (after password reset) -->
    <div id="reset-success" class="hidden mb-4 rounded-xl bg-emerald-500/10 border border-emerald-500/30 px-4 py-3 text-sm text-emerald-300">
      Password updated successfully. You can now log in.
    </div>

    <!-- EMAIL -->
    <label class="text-sm text-slate-600 dark:text-slate-300">Email</label>
    <input id="email" placeholder="you@example.com"
      class="w-full mt-1 mb-4 px-3 py-2 bg-slate-200 dark:bg-slate-800 rounded outline-none focus:ring-2 focus:ring-primary-500" />

    <!-- PASSWORD -->
    <label class="text-sm text-slate-600 dark:text-slate-300">Password</label>
    <input id="password" type="password" placeholder="Your password"
      class="w-full mt-1 mb-2 px-3 py-2 bg-slate-200 dark:bg-slate-800 rounded outline-none focus:ring-2 focus:ring-primary-500" />

    <!-- FORGOT PASSWORD -->
    <div class="mb-5 text-right">
      <a href="/forgot.html" class="text-sm text-slate-500 dark:text-slate-500 dark:text-slate-400 hover:text-primary-400 transition">
        Forgot password?
      </a>
    </div>

    <!-- ERROR -->
    <div id="auth-error" class="min-h-[1.25rem] mb-3 text-sm text-rose-400"></div>

    <!-- LOGIN BUTTON -->
    <button onclick="login()"
      class="w-full bg-primary-500 hover:bg-primary-600 transition py-2 rounded-xl font-medium">
      Log in
    </button>

    <!-- SIGNUP LINK -->
    <p class="text-sm text-slate-500 dark:text-slate-500 dark:text-slate-400 mt-4 text-center">
      Don't you have an account?
      <a href="/signup.html" class="text-primary-400 hover:underline">
        Create one...
      </a>
    </p>

  </div>

<script>
// Show success message after password reset
if (new URLSearchParams(window.location.search).get('reset') === '1') {
  document.getElementById('reset-success').classList.remove('hidden');
}

async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errorBox = document.getElementById('auth-error');

  errorBox.textContent = '';

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!res.ok) {
      errorBox.textContent = data.error || 'Login failed';
      return;
    }

    localStorage.setItem('cloudtrips_auth_token', data.token);
    localStorage.setItem('cloudtrips_auth_user', JSON.stringify(data.user));

    window.location.href = '/';

  } catch (err) {
    console.error('Login error:', err);
    errorBox.textContent = 'Network error. Please try again.';
  }
}

// Allow Enter key to submit
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') login();
});
</script>

<button onclick="toggleTheme()"
  data-theme-toggle
  class="fixed top-4 right-4 inline-flex items-center justify-center rounded-xl border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 p-2 text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 transition">
  <i data-lucide="sun" class="h-4 w-4"></i>
</button>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="/helpers.js"></script>
<script>
  // Set correct icon on load
  document.querySelector('[data-theme-toggle] i').setAttribute(
    'data-lucide', getTheme() === 'dark' ? 'sun' : 'moon'
  );
  if (window.lucide) lucide.createIcons();
</script>

</body>
</html>
