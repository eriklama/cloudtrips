<!DOCTYPE html>
<html lang="en" class="h-full dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link href="/output.css" rel="stylesheet">
</head>

<body class="min-h-full bg-slate-950 text-slate-100 flex items-center justify-center">

  <div class="w-full max-w-sm bg-slate-900 p-6 rounded-2xl shadow-lg">
    <h1 class="text-xl font-semibold mb-4">Login</h1>

    <input id="email" placeholder="Email"
      class="w-full mb-3 px-3 py-2 bg-slate-800 rounded" />

    <input id="password" type="password" placeholder="Password"
      class="w-full mb-4 px-3 py-2 bg-slate-800 rounded" />

    <button onclick="login()"
      class="w-full bg-primary-500 py-2 rounded">
      Sign in
    </button>
  </div>

<script>
async function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const res = await fetch('/login', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ email, password })
  });

  if (!res.ok) {
    alert('Login failed');
    return;
  }

  const data = await res.json();
  localStorage.setItem('token', data.token);

  window.location.href = '/';
}
</script>

</body>
</html>
