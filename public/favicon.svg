  <line x1="1" y1="16" x2="31" y2="16" stroke="#93C5FD" stroke-width="1" opacity="0.6"/>
  <!-- Longitude lines -->
  <ellipse cx="16" cy="16" rx="6" ry="15" fill="none" stroke="#93C5FD" stroke-width="1" opacity="0.6"/>
  <ellipse cx="16" cy="16" rx="11" ry="15" fill="none" stroke="#93C5FD" stroke-width="0.7" opacity="0.4"/>
