<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Trip Itinerary</title>

  <style>
    @page {
      size: A4;
      margin: 18mm 14mm;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      color: #111;
      font-size: 12px;
      line-height: 1.5;
    }

    .header {
      border-bottom: 2px solid #000;
      padding-bottom: 6px;
      margin-bottom: 10px;
    }

    h1 { font-size: 22px; margin: 0; }
    .subtitle { font-size: 12px; color: #555; }

    .summary {
      margin: 10px 0 14px;
      padding: 6px 8px;
      border: 1px solid #ddd;
      display: flex;
      justify-content: space-between;
    }

    .day { margin-bottom: 14px; page-break-inside: avoid; }

    .day-header {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #bbb;
      padding-bottom: 2px;
      margin-bottom: 5px;
      font-weight: 600;
    }

    .row {
      display: grid;
      grid-template-columns: 70px 1fr 90px;
      gap: 10px;
      padding: 4px 0;
      border-bottom: 1px solid #eee;
    }

    .time { font-variant-numeric: tabular-nums; }

    .notes { font-size: 11px; color: #666; }

    .right { text-align: right; }
    .km { font-size: 11px; color: #666; }

    .totals {
      text-align: right;
      font-size: 11px;
      margin-top: 4px;
      color: #444;
    }

    .error {
      padding: 20px;
      color: red;
      font-family: monospace;
    }
  </style>
</head>

<body>

<div class="header">
  <h1 id="title">Trip</h1>
  <div id="subtitle" class="subtitle"></div>
</div>

<div id="summary" class="summary"></div>
<div id="content">Loading...</div>

<script>
function getTypeMeta(type) {
  const map = {
    plane: { icon: '✈️', label: 'Plane' },
    car: { icon: '🚗', label: 'Car' },
    hike: { icon: '🥾', label: 'Hike' },
    city: { icon: '🏙️', label: 'City' },
    accommodation: { icon: '🏨', label: 'Stay' },
    other: { icon: '📍', label: 'Other' }
  };
  return map[type] || map.other;
}

function formatTime(v) {
  if (!v) return '';
  const d = new Date(v);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function load() {
  try {
    const raw = sessionStorage.getItem('print_trip');
    if (!raw) throw new Error('No data in sessionStorage');

    const trip = JSON.parse(raw);

    document.getElementById('title').textContent = trip.name || 'Trip';

    const activities = (trip.activities || [])
      .sort((a, b) => new Date(a.startDate) - new Date(b.startDate));

    // subtitle
    if (activities.length) {
      const first = new Date(activities[0].startDate);
      const last = new Date(activities[activities.length - 1].startDate);
      document.getElementById('subtitle').textContent =
        `${first.toDateString()} — ${last.toDateString()}`;
    }

    // totals
    let totalCost = 0;
    let totalKm = 0;

    activities.forEach(a => {
      totalCost += Number(a.cost) || 0;
      totalKm += Number(a.distance) || 0;
    });

    document.getElementById('summary').innerHTML = `
      <div>Total cost: €${totalCost}</div>
      <div>Total distance: ${totalKm} km</div>
    `;

    // group by day
    const groups = {};
    activities.forEach(a => {
      const key = new Date(a.startDate).toISOString().slice(0,10);
      (groups[key] ||= []).push(a);
    });

    const container = document.getElementById('content');
    container.innerHTML = '';

    Object.keys(groups).sort().forEach(day => {
      const list = groups[day];
      const date = new Date(day);

      let dayCost = 0;
      let dayKm = 0;

      const rows = list.map(a => {
        const meta = getTypeMeta(a.type);

        const cost = Number(a.cost) || 0;
        const km = Number(a.distance) || 0;

        dayCost += cost;
        dayKm += km;

        return `
          <div class="row">
            <div class="time">${formatTime(a.startDate)}</div>

            <div>
              <div><strong>${meta.icon} ${meta.label}</strong> — ${a.location || ''}</div>
              ${a.notes ? `<div class="notes">${a.notes}</div>` : ''}
            </div>

            <div class="right">
              ${cost ? `€${cost}` : ''}
              ${km ? `<div class="km">${km} km</div>` : ''}
            </div>
          </div>
        `;
      }).join('');

      const section = document.createElement('div');
      section.className = 'day';

      section.innerHTML = `
        <div class="day-header">
          <div>${date.toDateString()}</div>
          <div>${list.length} activities</div>
        </div>
        ${rows}
        <div class="totals">
          ${dayCost ? `€${dayCost}` : ''}
          ${dayKm ? ` • ${dayKm} km` : ''}
        </div>
      `;

      container.appendChild(section);
    });

    setTimeout(() => window.print(), 300);

  } catch (err) {
    document.getElementById('content').innerHTML =
      `<div class="error">${err.message}</div>`;
  }
}

load();
</script>

</body>
</html>
