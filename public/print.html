<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Trip Itinerary</title>

  <style>
    @page {
      size: A4;
      margin: 16mm;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      color: #111;
      background: white;
      font-size: 12px;
      line-height: 1.45;
    }

    /* HEADER */
    .header {
      margin-bottom: 16px;
      border-bottom: 2px solid #000;
      padding-bottom: 8px;
    }

    h1 {
      font-size: 22px;
      margin: 0;
    }

    .subtitle {
      font-size: 12px;
      color: #555;
      margin-top: 4px;
    }

    /* DAY BLOCK */
    .day {
      margin-bottom: 14px;
      page-break-inside: avoid;
    }

    .day-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #ccc;
      margin-bottom: 6px;
      padding-bottom: 3px;
      font-weight: 600;
    }

    /* TABLE */
    .table {
      width: 100%;
    }

    .row {
      display: grid;
      grid-template-columns: 70px 1fr 90px;
      gap: 10px;
      padding: 4px 0;
      border-bottom: 1px solid #eee;
    }

    .time {
      font-variant-numeric: tabular-nums;
    }

    .desc {
      display: flex;
      flex-direction: column;
    }

    .type {
      font-weight: 600;
    }

    .notes {
      font-size: 11px;
      color: #666;
    }

    .right {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* TOTALS */
    .totals {
      margin-top: 4px;
      font-size: 11px;
      color: #444;
      text-align: right;
    }
  </style>
</head>

<body>

<div class="header">
  <h1 id="title">Trip</h1>
  <div id="subtitle" class="subtitle"></div>
</div>

<div id="content">Loading...</div>

<script>

/* =========================
   TYPE MAPPING
========================= */

function getTypeMeta(type) {
  const map = {
    plane: { icon: '✈️', label: 'Plane' },
    car: { icon: '🚗', label: 'Car' },
    hike: { icon: '🥾', label: 'Hike' },
    city: { icon: '🏙️', label: 'City' },
    accommodation: { icon: '🏨', label: 'Stay' },
    other: { icon: '📍', label: 'Other' }
  };
  return map[type] || map.other;
}

/* =========================
   LOAD
========================= */

async function load() {
  const params = new URLSearchParams(window.location.search);
  const tripId = params.get('id');
  if (!tripId) return;

  const pin = localStorage.getItem(`trip_pin_${tripId}`) || '';

  const res = await fetch(`/getTrip?trip=${tripId}`, {
    headers: pin ? { 'x-pin': pin } : {}
  });

  const data = await res.json();

  document.getElementById('title').textContent = data.name;

  const activities = (data.activities || [])
    .sort((a, b) => new Date(a.start) - new Date(b.start));

  // DATE RANGE
  if (activities.length) {
    const first = new Date(activities[0].start);
    const last = new Date(activities[activities.length - 1].start);
    document.getElementById('subtitle').textContent =
      `${first.toDateString()} — ${last.toDateString()}`;
  }

  // GROUP
  const groups = {};
  activities.forEach(a => {
    const key = new Date(a.start).toISOString().slice(0,10);
    if (!groups[key]) groups[key] = [];
    groups[key].push(a);
  });

  const container = document.getElementById('content');
  container.innerHTML = '';

  Object.keys(groups).forEach(day => {
    const date = new Date(day);
    const list = groups[day];

    let totalCost = 0;
    let totalKm = 0;

    const section = document.createElement('div');
    section.className = 'day';

    const rows = list.map(a => {
      const meta = getTypeMeta(a.type);

      const cost = Number(a.cost) || 0;
      const km = Number(a.distance) || 0;

      totalCost += cost;
      totalKm += km;

      return `
        <div class="row">
          <div class="time">${formatTime(a.start)}</div>

          <div class="desc">
            <div class="type">${meta.icon} ${meta.label} — ${a.location || ''}</div>
            ${a.notes ? `<div class="notes">${a.notes}</div>` : ''}
          </div>

          <div class="right">
            ${cost ? '€' + cost : ''}
            ${km ? `<br>${km} km` : ''}
          </div>
        </div>
      `;
    }).join('');

    section.innerHTML = `
      <div class="day-header">
        <div>${date.toDateString()}</div>
        <div>${list.length} activities</div>
      </div>

      <div class="table">
        ${rows}
      </div>

      <div class="totals">
        ${totalCost ? `Total: €${totalCost}` : ''}
        ${totalKm ? ` • ${totalKm} km` : ''}
      </div>
    `;

    container.appendChild(section);
  });

  setTimeout(() => window.print(), 500);
}

/* =========================
   HELPERS
========================= */

function formatTime(v) {
  if (!v) return '';
  const d = new Date(v);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

load();

</script>

</body>
</html>
