<!DOCTYPE html>
<html lang="en" class="h-full dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trip</title>

  <link href="/output.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="min-h-full bg-slate-950 text-slate-100">
<div class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-950 to-slate-900">

  <!-- HEADER -->
  <header class="border-b border-slate-800">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between gap-3">

      <div class="flex items-center gap-2">
        <button onclick="goBack()"
          class="rounded-xl border border-slate-700 bg-slate-900 px-3 py-2 text-sm hover:bg-slate-800">
          ← Trips
        </button>

        <h1 id="trip-title" class="text-xl font-semibold tracking-tight">
          Trip
        </h1>
      </div>

      <div class="flex items-center gap-2">
        <button onclick="goToTimeline()"
          class="rounded-xl border border-slate-700 bg-slate-900 px-3 py-2 text-sm hover:bg-slate-800">
          Timeline
        </button>

        <button onclick="goToCosts()"
          class="rounded-xl border border-slate-700 bg-slate-900 px-3 py-2 text-sm hover:bg-slate-800">
          Costs
        </button>

        <span id="auth-user-email" class="hidden sm:inline text-sm text-slate-400"></span>

        <button id="logout-button"
          class="rounded-xl border border-slate-700 bg-slate-900 px-3 py-2 text-sm hover:bg-slate-800">
          Logout
        </button>
      </div>

    </div>
  </header>

  <!-- MAIN -->
  <main class="max-w-6xl mx-auto px-4 py-5 pb-24">

    <!-- Add Activity -->
    <div class="mb-6 grid gap-2 sm:grid-cols-2 lg:grid-cols-6">
      <input id="activityType" placeholder="Type"
        class="input" />
      <input id="activityStart" type="datetime-local"
        class="input" />
      <input id="activityEnd" type="datetime-local"
        class="input" />
      <input id="activityCost" type="number" placeholder="Cost"
        class="input" />
      <input id="activityLocation" placeholder="Location"
        class="input" />
      <input id="activityDistance" type="number" placeholder="km"
        class="input" />

      <textarea id="activityNotes" placeholder="Notes"
        class="input col-span-full"></textarea>

      <button onclick="addActivity()"
        class="btn-primary col-span-full">
        Add Activity
      </button>
    </div>

    <!-- Activities -->
    <div id="activities" class="space-y-3"></div>

  </main>

</div>

<script src="/auth.js"></script>
<script src="/script.js" defer></script>

<script>
  lucide.createIcons();
</script>

</body>
</html>
