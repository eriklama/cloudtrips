<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <script>
    (function() {
      const theme = localStorage.getItem('cloudtrips_theme') || 'dark';
      document.documentElement.classList.toggle('dark', theme === 'dark');
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trip</title>

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2563eb">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/icons/favicon.ico">
  <link href="/output.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* iOS Safari input fix */
    input[type="date"],
    input[type="time"],
    input[type="number"],
    input[type="text"],
    select,
    textarea {
      font-size: 16px;
      -webkit-appearance: none;
      appearance: none;
      max-width: 100%;
      box-sizing: border-box;
    }

    /* Restore height for date/time on iOS */
    input[type="date"],
    input[type="time"] {
      min-height: 42px;
      line-height: 1.5;
      padding-top: 0.5rem;
      padding-bottom: 0.5rem;
    }

    /* Make calendar/clock icons visible */
    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator {
      filter: invert(0.7);
      cursor: pointer;
      opacity: 1;
    }

    /* Form field label style */
    .field-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: rgb(100 116 139);
      margin-bottom: 4px;
    }

    /* Ensure input text visible in both modes */
    input,
    select,
    textarea {
      color: rgb(15 23 42);
    }

    .dark input,
    .dark select,
    .dark textarea {
      color: rgb(241 245 249);
    }
  </style>
</head>

<body class="min-h-full bg-slate-300 dark:bg-slate-950 text-slate-900 dark:text-slate-100 overflow-x-hidden">
<div class="min-h-screen bg-gradient-to-br from-slate-300 via-slate-200 to-slate-300 dark:from-slate-950 dark:via-slate-950 dark:to-slate-900">

  <!-- HEADER -->
  <header class="border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between gap-3">

      <!-- Title -->
      <h1 id="trip-title" class="text-xl font-semibold tracking-tight">
        Trip
      </h1>

      <!-- NAV + AUTH -->
      <div class="flex items-center gap-2">

        <!-- Dynamic nav -->
        <div id="nav-actions" class="flex gap-2"></div>

        <!-- Share button -->
        <button onclick="openShareModal()"
          class="inline-flex items-center gap-2 rounded-xl border border-primary-500/30 bg-primary-500/10 px-3 py-2 text-sm text-primary-300 hover:bg-primary-500/20 transition">
          <i data-lucide="share-2" class="w-4 h-4"></i>
          Share
        </button>

        <!-- Members button -->
        <button onclick="openMembersModal()"
          class="inline-flex items-center gap-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 px-3 py-2 text-sm text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-800 transition">
          <i data-lucide="users" class="w-4 h-4"></i>
          <span class="hidden sm:inline">Members</span>
        </button>

        <!-- Manage share links -->
        <button onclick="openManageSharesModal()"
          class="inline-flex items-center gap-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 px-3 py-2 text-sm text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-800 transition">
          <i data-lucide="link" class="w-4 h-4"></i>
          <span class="hidden sm:inline">Links</span>
        </button>

        <!-- User -->
        <span id="auth-user-email"
          class="hidden sm:inline text-sm text-slate-500 dark:text-slate-400 truncate max-w-[160px]">
        </span>

        <!-- Settings -->
        <button onclick="openSettingsModal()"
          class="inline-flex items-center justify-center rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-800 transition"
          aria-label="Settings">
          <i data-lucide="settings" class="w-4 h-4"></i>
        </button>

        <!-- Logout -->
        <button id="logout-button" onclick="logout()"
          class="inline-flex items-center justify-center gap-1 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 px-3 py-2 text-sm font-medium text-slate-700 dark:text-slate-200 hover:border-slate-300 dark:hover:border-slate-600 hover:bg-slate-50 dark:hover:bg-slate-800 transition">
          <i data-lucide="log-out" class="w-4 h-4"></i>
        </button>

      </div>

    </div>
  </header>

  <!-- Trip notes + country -->
  <div id="trip-notes-section" class="border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950">
    <div class="max-w-6xl mx-auto px-4 py-2 flex gap-3 items-start">
      <textarea id="trip-notes"
        placeholder="Trip notes, packing list, visa info..."
        rows="2"
        class="flex-1 rounded-xl border-0 bg-transparent px-0 py-1 text-sm text-slate-900 dark:text-slate-100 outline-none resize-none placeholder:text-slate-400 dark:placeholder:text-slate-600"
        oninput="saveTripNotes()"></textarea>
      <div class="relative flex items-center">
        <input id="trip-country" type="text" placeholder="Country" list="country-list"
          class="w-36 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 px-3 py-1.5 pr-7 text-sm outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 placeholder:text-slate-400"
          oninput="saveTripCountry()" onchange="saveTripCountryNow()" />
        <span id="country-saved" class="hidden absolute right-2 text-emerald-500">
          <i data-lucide="check" class="h-3.5 w-3.5"></i>
        </span>
      </div>
      <datalist id="country-list">
        <option value="Afghanistan"><option value="Albania"><option value="Algeria"><option value="Andorra"><option value="Angola">
        <option value="Antigua and Barbuda"><option value="Argentina"><option value="Armenia"><option value="Australia"><option value="Austria">
        <option value="Azerbaijan"><option value="Bahamas"><option value="Bahrain"><option value="Bangladesh"><option value="Barbados">
        <option value="Belarus"><option value="Belgium"><option value="Belize"><option value="Benin"><option value="Bhutan">
        <option value="Bolivia"><option value="Bosnia and Herzegovina"><option value="Botswana"><option value="Brazil"><option value="Brunei">
        <option value="Bulgaria"><option value="Burkina Faso"><option value="Burundi"><option value="Cabo Verde"><option value="Cambodia">
        <option value="Cameroon"><option value="Canada"><option value="Central African Republic"><option value="Chad"><option value="Chile">
        <option value="China"><option value="Colombia"><option value="Comoros"><option value="Congo"><option value="Costa Rica">
        <option value="Croatia"><option value="Cuba"><option value="Cyprus"><option value="Czech Republic"><option value="Denmark">
        <option value="Djibouti"><option value="Dominica"><option value="Dominican Republic"><option value="Ecuador"><option value="Egypt">
        <option value="El Salvador"><option value="Equatorial Guinea"><option value="Eritrea"><option value="Estonia"><option value="Eswatini">
        <option value="Ethiopia"><option value="Fiji"><option value="Finland"><option value="France"><option value="Gabon">
        <option value="Gambia"><option value="Georgia"><option value="Germany"><option value="Ghana"><option value="Greece">
        <option value="Grenada"><option value="Guatemala"><option value="Guinea"><option value="Guinea-Bissau"><option value="Guyana">
        <option value="Haiti"><option value="Honduras"><option value="Hungary"><option value="Iceland"><option value="India">
        <option value="Indonesia"><option value="Iran"><option value="Iraq"><option value="Ireland"><option value="Israel">
        <option value="Italy"><option value="Jamaica"><option value="Japan"><option value="Jordan"><option value="Kazakhstan">
        <option value="Kenya"><option value="Kiribati"><option value="Kuwait"><option value="Kyrgyzstan"><option value="Laos">
        <option value="Latvia"><option value="Lebanon"><option value="Lesotho"><option value="Liberia"><option value="Libya">
        <option value="Liechtenstein"><option value="Lithuania"><option value="Luxembourg"><option value="Madagascar"><option value="Malawi">
        <option value="Malaysia"><option value="Maldives"><option value="Mali"><option value="Malta"><option value="Marshall Islands">
        <option value="Mauritania"><option value="Mauritius"><option value="Mexico"><option value="Micronesia"><option value="Moldova">
        <option value="Monaco"><option value="Mongolia"><option value="Montenegro"><option value="Morocco"><option value="Mozambique">
        <option value="Myanmar"><option value="Namibia"><option value="Nauru"><option value="Nepal"><option value="Netherlands">
        <option value="New Zealand"><option value="Nicaragua"><option value="Niger"><option value="Nigeria"><option value="North Korea">
        <option value="North Macedonia"><option value="Norway"><option value="Oman"><option value="Pakistan"><option value="Palau">
        <option value="Palestine"><option value="Panama"><option value="Papua New Guinea"><option value="Paraguay"><option value="Peru">
        <option value="Philippines"><option value="Poland"><option value="Portugal"><option value="Qatar"><option value="Romania">
        <option value="Russia"><option value="Rwanda"><option value="Saint Kitts and Nevis"><option value="Saint Lucia"><option value="Saint Vincent and the Grenadines">
        <option value="Samoa"><option value="San Marino"><option value="Sao Tome and Principe"><option value="Saudi Arabia"><option value="Senegal">
        <option value="Serbia"><option value="Seychelles"><option value="Sierra Leone"><option value="Singapore"><option value="Slovakia">
        <option value="Slovenia"><option value="Solomon Islands"><option value="Somalia"><option value="South Africa"><option value="South Korea">
        <option value="South Sudan"><option value="Spain"><option value="Sri Lanka"><option value="Sudan"><option value="Suriname">
        <option value="Sweden"><option value="Switzerland"><option value="Syria"><option value="Taiwan"><option value="Tajikistan">
        <option value="Tanzania"><option value="Thailand"><option value="Timor-Leste"><option value="Togo"><option value="Tonga">
        <option value="Trinidad and Tobago"><option value="Tunisia"><option value="Turkey"><option value="Turkmenistan"><option value="Tuvalu">
        <option value="Uganda"><option value="Ukraine"><option value="United Arab Emirates"><option value="United Kingdom"><option value="United States">
        <option value="Uruguay"><option value="Uzbekistan"><option value="Vanuatu"><option value="Vatican City"><option value="Venezuela">
        <option value="Vietnam"><option value="Yemen"><option value="Zambia"><option value="Zimbabwe">
      </datalist>
    </div>
  </div>

  <!-- MAIN -->
  <main class="max-w-6xl mx-auto px-4 py-5 pb-24">

    <!-- Add Activity Form -->
    <div id="activity-form" class="mb-6 space-y-3">

      <!-- Row 1: Type -->
      <div>
        <div class="field-label">Type</div>
        <select id="activityType"
          class="w-full min-w-0 rounded-xl border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 px-3 py-2 text-sm outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500">
          <option value="plane">✈️ Plane</option>
          <option value="car">🚗 Car</option>
          <option value="hike">🥾 Hike</option>
          <option value="city">🏙️ City</option>
          <option value="accommodation">🏨 Accommodation</option>
          <option value="other">📍 Other</option>
        </select>
      </div>

      <!-- Row 2: Cost + Currency -->
      <div>
        <div class="field-label">Cost</div>
        <div class="grid grid-cols-2 gap-2 min-w-0">
          <input id="activityCost" type="number" placeholder="Amount"
            class="w-full min-w-0 rounded-xl border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 px-3 py-2 text-sm outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500" />
          <select id="activityCurrency"
            class="w-full min-w-0 rounded-xl border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 px-3 py-2 text-sm outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500">
            <option value="EUR">EUR €</option>
            <option value="USD">USD $</option>
            <option value="GBP">GBP £</option>
            <option value="CZK">CZK Kč</option>
            <option value="CHF">CHF Fr</option>
            <option value="PLN">PLN zł</option>
            <option value="HUF">HUF Ft</option>
            <option value="SEK">SEK kr</option>
            <option value="NOK">NOK kr</option>
            <option value="DKK">DKK kr</option>
          </select>
        </div>
      </div>

      <!-- Row 3: Start date + time -->
      <div>
        <div class="field-label">Start</div>
        <div class="grid grid-cols-2 gap-2 min-w-0">
          <input id="activityStartDate" type="date"
            class="w-full min-w-0 rounded-xl border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 px-3 py-2 text-sm outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500" />
          <input id="activityStartTime" type="time"
            class="w-full min-w-0 rounded-xl border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 px-3 py-2 text-sm outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500" />
        </div>
      </div>

      <!-- Row 4: End date + time -->
      <div>
        <div class="field-label">End</div>
        <div class="grid grid-cols-2 gap-2 min-w-0">
          <input id="activityEndDate" type="date"
            class="w-full min-w-0 rounded-xl border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 px-3 py-2 text-sm outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500" />
          <input id="activityEndTime" type="time"
            class="w-full min-w-0 rounded-xl border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 px-3 py-2 text-sm outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500" />
        </div>
      </div>

      <!-- Row 5: Name + Location -->
      <div>
        <div class="field-label">Activity</div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 min-w-0">
          <input id="activityName" placeholder="Name"
            class="w-full min-w-0 rounded-xl border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 px-3 py-2 text-sm outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500" />
          <input id="activityLocation" placeholder="Location"
            class="w-full min-w-0 rounded-xl border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 px-3 py-2 text-sm outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500" />
        </div>
      </div>

      <!-- Row 6: Distance -->
      <div>
        <div class="field-label">Distance</div>
        <input id="activityDistance" type="number" placeholder="km"
          class="w-full min-w-0 rounded-xl border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 px-3 py-2 text-sm outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500" />
      </div>

      <!-- Row 7: Notes -->
      <div>
        <div class="field-label">Notes</div>
        <textarea id="activityNotes" placeholder="Additional notes..."
          class="w-full min-w-0 rounded-xl border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 px-3 py-2 text-sm outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500"></textarea>
      </div>

      <!-- Row 8: Submit -->
      <button id="activity-submit-btn" onclick="addActivity()"
        class="inline-flex w-full items-center justify-center gap-2 rounded-xl bg-primary-600 px-4 py-2 text-sm font-medium text-white hover:bg-primary-500 active:scale-[0.98] transition">
        <i data-lucide="plus" class="w-4 h-4"></i>
        Add Activity
      </button>

    </div>

    <!-- Activities Header + Search -->
    <div id="activities-header" class="hidden mb-3 space-y-2">
      <div class="flex items-center gap-2">
        <div class="relative flex-1">
          <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-slate-400 pointer-events-none"></i>
          <input id="activity-search" type="text" placeholder="Search activities..."
            oninput="filterActivities()"
            class="w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 pl-9 pr-3 py-2 text-sm outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 placeholder-slate-400" />
        </div>
        <button onclick="clearActivitySearch()" id="activity-search-clear"
          class="hidden inline-flex items-center justify-center rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-500 hover:text-slate-700 dark:hover:text-slate-200 transition">
          <i data-lucide="x" class="h-4 w-4"></i>
        </button>
        <button onclick="toggleAllActivityDays()" id="activity-collapse-all-btn"
          title="Collapse all"
          class="inline-flex items-center justify-center rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-500 hover:text-slate-700 dark:hover:text-slate-200 transition">
          <i data-lucide="chevrons-up-down" class="h-4 w-4"></i>
        </button>
      </div>
      <div id="activity-type-filters" class="flex flex-wrap gap-1.5">
        <button onclick="toggleTypeFilter('')" data-type="" class="type-filter-pill active rounded-full border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 px-3 py-1 text-xs font-medium text-slate-600 dark:text-slate-300 hover:border-primary-400 transition">All</button>
        <button onclick="toggleTypeFilter('plane')" data-type="plane" class="type-filter-pill rounded-full border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 px-3 py-1 text-xs font-medium text-slate-600 dark:text-slate-300 hover:border-primary-400 transition">✈️ Plane</button>
        <button onclick="toggleTypeFilter('car')" data-type="car" class="type-filter-pill rounded-full border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 px-3 py-1 text-xs font-medium text-slate-600 dark:text-slate-300 hover:border-primary-400 transition">🚗 Car</button>
        <button onclick="toggleTypeFilter('hike')" data-type="hike" class="type-filter-pill rounded-full border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 px-3 py-1 text-xs font-medium text-slate-600 dark:text-slate-300 hover:border-primary-400 transition">🥾 Hike</button>
        <button onclick="toggleTypeFilter('city')" data-type="city" class="type-filter-pill rounded-full border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 px-3 py-1 text-xs font-medium text-slate-600 dark:text-slate-300 hover:border-primary-400 transition">🏙️ City</button>
        <button onclick="toggleTypeFilter('accommodation')" data-type="accommodation" class="type-filter-pill rounded-full border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 px-3 py-1 text-xs font-medium text-slate-600 dark:text-slate-300 hover:border-primary-400 transition">🏨 Stay</button>
        <button onclick="toggleTypeFilter('other')" data-type="other" class="type-filter-pill rounded-full border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 px-3 py-1 text-xs font-medium text-slate-600 dark:text-slate-300 hover:border-primary-400 transition">📍 Other</button>
      </div>
    </div>

    <!-- Activities -->
    <div id="activities" class="space-y-3"></div>

    <!-- Load more -->
    <div id="load-more-container" class="hidden mt-4 flex justify-center">
      <button onclick="loadMoreActivitiesUI()" id="load-more-btn"
        class="inline-flex items-center gap-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 px-5 py-2.5 text-sm font-medium text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-800 transition">
        <i data-lucide="chevrons-down" class="h-4 w-4"></i>
        Load more activities
      </button>
    </div>

  </main>

</div>

<!-- Share Modal -->
<div id="share-modal" class="hidden fixed inset-0 z-50 items-center justify-center bg-slate-900/20 dark:bg-slate-950/60 p-4">
  <div class="w-full max-w-sm rounded-3xl border border-slate-200 bg-white p-5 shadow-2xl dark:border-slate-800 dark:bg-slate-900">
    <h2 class="mb-4 text-lg font-semibold tracking-tight text-slate-900 dark:text-slate-100">Share Trip</h2>
    <input id="share-link" type="text" readonly
      class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm outline-none dark:border-slate-700 dark:bg-slate-950 dark:text-slate-100" />
    <div class="mt-5 flex justify-end gap-2">
      <button onclick="closeShareModal()"
        class="inline-flex items-center justify-center rounded-2xl border border-slate-200 bg-white px-4 py-2.5 text-sm font-medium text-slate-700 hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-950 dark:text-slate-200 dark:hover:bg-slate-800">
        Close
      </button>
      <button onclick="copyShareLink()"
        class="inline-flex items-center justify-center rounded-2xl bg-primary-600 px-4 py-2.5 text-sm font-medium text-white hover:bg-primary-700">
        Copy Link
      </button>
    </div>
  </div>
</div>

<script src="/state.js"></script>
<script src="/helpers.js"></script>
<script src="/ui.js"></script>
<script src="/auth.js"></script>
<script src="/api.js"></script>
<script src="/trips.js"></script>
<script src="/activities.js"></script>
<script src="/share.js"></script>
<script src="/members.js"></script>
<script src="/export.js"></script>
<script src="/init.js"></script>

</body>
</html>
