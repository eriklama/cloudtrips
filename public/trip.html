<!DOCTYPE html>
<html lang="en" class="h-full dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trip</title>

  <link href="/output.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="min-h-full bg-slate-950 text-slate-100">
<div class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-950 to-slate-900">

  <!-- HEADER -->
  <header class="border-b border-slate-800">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between gap-3">

      <div class="flex items-center gap-2">
        <button onclick="goBack()"
          class="inline-flex items-center gap-1 rounded-xl border border-slate-700 bg-slate-900 px-3 py-2 text-sm hover:bg-slate-800 transition">
          ← Trips
        </button>

        <h1 id="trip-title" class="text-xl font-semibold tracking-tight">
          Trip
        </h1>
      </div>

      <div class="flex items-center gap-2">

        <button onclick="goToTimeline()"
          class="inline-flex items-center justify-center rounded-xl border border-slate-700 bg-slate-900 px-3 py-2 text-sm hover:bg-slate-800 transition">
          Timeline
        </button>

        <button onclick="goToCosts()"
          class="inline-flex items-center justify-center rounded-xl border border-slate-700 bg-slate-900 px-3 py-2 text-sm hover:bg-slate-800 transition">
          Costs
        </button>

        <!-- ✅ SHARE BUTTON -->
        <button onclick="openShareModal()"
          class="inline-flex items-center gap-2 rounded-xl border border-primary-500/30 bg-primary-500/10 px-3 py-2 text-sm text-primary-300 hover:bg-primary-500/20 transition">
          <i data-lucide="share-2" class="w-4 h-4"></i>
          Share
        </button>

        <span id="auth-user-email"
          class="hidden sm:inline text-sm text-slate-400 truncate max-w-[160px]">
        </span>

        <button id="logout-button"
          class="inline-flex items-center gap-1 rounded-xl border border-slate-700 bg-slate-900 px-3 py-2 text-sm hover:bg-slate-800 transition">
          <i data-lucide="log-out" class="w-4 h-4"></i>
          Logout
        </button>

      </div>

    </div>
  </header>

  <!-- MAIN -->
  <main class="max-w-6xl mx-auto px-4 py-5 pb-24">

    <!-- Add Activity -->
    <div id="activity-form" class="mb-6 grid gap-2 sm:grid-cols-2 lg:grid-cols-6">

      <select id="activityType"
        class="w-full rounded-xl border border-slate-700 bg-slate-900 px-3 py-2 text-sm text-white outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500">
        <option value="plane">✈️ Plane</option>
        <option value="car">🚗 Car</option>
        <option value="hike">🥾 Hike</option>
        <option value="city">🏙️ City</option>
        <option value="accommodation">🏨 Accommodation</option>
        <option value="other">📍 Other</option>
      </select>

      <input id="activityStart" type="datetime-local"
        class="w-full rounded-xl border border-slate-700 bg-slate-900 px-3 py-2 text-sm outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500" />

      <input id="activityEnd" type="datetime-local"
        class="w-full rounded-xl border border-slate-700 bg-slate-900 px-3 py-2 text-sm outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500" />

      <input id="activityCost" type="number" placeholder="Cost"
        class="w-full rounded-xl border border-slate-700 bg-slate-900 px-3 py-2 text-sm outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500" />

      <input id="activityLocation" placeholder="Location"
        class="w-full rounded-xl border border-slate-700 bg-slate-900 px-3 py-2 text-sm outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500" />

      <input id="activityDistance" type="number" placeholder="km"
        class="w-full rounded-xl border border-slate-700 bg-slate-900 px-3 py-2 text-sm outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500" />

      <textarea id="activityNotes" placeholder="Notes"
        class="w-full rounded-xl border border-slate-700 bg-slate-900 px-3 py-2 text-sm col-span-full outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500"></textarea>

      <button onclick="addActivity()"
        class="inline-flex items-center justify-center gap-2 rounded-xl bg-primary-600 px-4 py-2 text-sm font-medium text-white hover:bg-primary-500 active:scale-[0.98] transition col-span-full">
        <i data-lucide="plus" class="w-4 h-4"></i>
        Add Activity
      </button>

    </div>

    <!-- Activities -->
    <div id="activities" class="space-y-3"></div>

  </main>

</div>

<!-- ✅ SHARE MODAL -->
<div id="share-modal"
  class="fixed inset-0 hidden items-center justify-center bg-black/70 z-50 backdrop-blur-sm">

  <div class="w-full max-w-md rounded-2xl border border-slate-700 bg-slate-900 p-6 shadow-xl">

    <h2 class="text-lg font-semibold mb-4">Share trip</h2>

    <p class="text-sm text-slate-400 mb-4">
      Anyone with this link can view the trip.
    </p>

    <div class="flex gap-2 mb-4">
      <input id="share-link"
        class="flex-1 px-3 py-2 rounded-xl bg-slate-800 text-sm outline-none"
        readonly />

      <button onclick="copyShareLink()"
        class="inline-flex items-center gap-2 rounded-xl bg-primary-600 px-3 py-2 text-sm text-white hover:bg-primary-500 transition">
        <i data-lucide="copy" class="w-4 h-4"></i>
      </button>
    </div>

    <button onclick="closeShareModal()"
      class="w-full rounded-xl border border-slate-700 bg-slate-800 py-2 text-sm hover:bg-slate-700 transition">
      Close
    </button>

  </div>
</div>

<script src="/auth.js"></script>
<script src="/script.js" defer></script>

<script>
document.addEventListener('DOMContentLoaded', async () => {

  if (typeof requireAuth === 'function') {
    const user = await requireAuth();
    if (!user) return;
  }

  if (window.lucide) {
    lucide.createIcons();
  }

});
</script>

</body>
</html>
