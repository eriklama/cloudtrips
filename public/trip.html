<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trip</title>

  <link href="/styles.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="min-h-full bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">
<div class="min-h-screen">

  <header class="border-b px-4 py-3 flex justify-between">
    <h1 id="trip-title" class="text-lg font-semibold">Trip</h1>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-4 space-y-4 pb-20">

    <!-- Form -->
    <section class="p-4 rounded-2xl border bg-white dark:bg-slate-900 space-y-3">

      <input id="activityName" placeholder="Activity"
        class="w-full rounded-xl border px-3 py-2.5 text-sm" />

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <input id="startDate" type="datetime-local" class="rounded-xl border px-3 py-2.5 text-sm" />
        <input id="endDate" type="datetime-local" class="rounded-xl border px-3 py-2.5 text-sm" />
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <input id="cost" placeholder="Cost" class="rounded-xl border px-3 py-2.5 text-sm" />
        <input id="activity-distance" placeholder="KM" class="rounded-xl border px-3 py-2.5 text-sm" />
      </div>

      <textarea id="notes" placeholder="Notes"
        class="w-full rounded-xl border px-3 py-2.5 text-sm"></textarea>

      <button onclick="saveActivity()"
        class="w-full sm:w-auto rounded-xl bg-primary-600 text-white px-3 py-2.5 text-sm">
        Save Activity
      </button>

    </section>

    <!-- Activities -->
    <div id="activities" class="space-y-3"></div>

  </main>

</div>

<script src="/script.js" defer></script>
</body>
</html>
