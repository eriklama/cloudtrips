<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <script>
  (function() {
    const theme = localStorage.getItem('cloudtrips_theme') || 'dark';
    document.documentElement.classList.toggle('dark', theme === 'dark');
  })();
</script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/icons/favicon.ico">
  <title>Sign up · CloudTrips</title>
  <link href="/output.css" rel="stylesheet" />
</head>
<body class="min-h-full bg-white dark:bg-slate-950 text-slate-900 dark:text-slate-100">
  <div class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md rounded-2xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/80 p-6 shadow-2xl">
      <h1 class="text-2xl font-semibold tracking-tight">Create account</h1>
      <p class="mt-2 text-sm text-slate-500 dark:text-slate-500 dark:text-slate-400">Get your own private trips workspace.</p>

      <form id="signup-form" class="mt-6 space-y-4">
        <div>
          <label class="mb-2 block text-sm text-slate-600 dark:text-slate-300">Email</label>
          <input
            name="email"
            type="email"
            autocomplete="email"
            required
            class="w-full rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 px-4 py-3 text-slate-900 dark:text-slate-100 outline-none ring-0 placeholder:text-slate-500 dark:text-slate-500 focus:border-indigo-500"
            placeholder="you@example.com"
          />
        </div>

        <div>
          <label class="mb-2 block text-sm text-slate-600 dark:text-slate-300">Password</label>
          <input
            name="password"
            type="password"
            autocomplete="new-password"
            required
            class="w-full rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 px-4 py-3 text-slate-900 dark:text-slate-100 outline-none ring-0 placeholder:text-slate-500 dark:text-slate-500 focus:border-indigo-500"
            placeholder="At least 8 characters"
          />
        </div>

        <div>
          <label class="mb-2 block text-sm text-slate-600 dark:text-slate-300">Confirm password</label>
          <input
            name="confirmPassword"
            type="password"
            autocomplete="new-password"
            required
            class="w-full rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 px-4 py-3 text-slate-900 dark:text-slate-100 outline-none ring-0 placeholder:text-slate-500 dark:text-slate-500 focus:border-indigo-500"
            placeholder="Repeat password"
          />
        </div>

        <div id="auth-error" class="min-h-[1.25rem] text-sm text-rose-400"></div>

        <button
          type="submit"
          class="inline-flex w-full items-center justify-center rounded-xl bg-indigo-600 px-4 py-3 font-medium text-white transition hover:bg-indigo-500 disabled:opacity-60"
        >
          Create account
        </button>
      </form>

      <p class="mt-5 text-sm text-slate-500 dark:text-slate-500 dark:text-slate-400">
        Already have an account?
        <a href="/login.html" class="text-indigo-400 hover:text-indigo-300">Log in</a>
      </p>
    </div>
  </div>

  <!-- Auth MUST be before script.js but auth.js is not used-->
<!--<script src="/auth.js"></script>-->

<script src="/state.js"></script>
<script src="/helpers.js"></script>
<script src="/auth.js"></script>
<script src="/api.js"></script>

<button onclick="toggleTheme()"
  data-theme-toggle
  class="fixed top-4 right-4 inline-flex items-center justify-center rounded-xl border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 p-2 text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 transition">
  <i data-lucide="sun" class="h-4 w-4"></i>
</button>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="/helpers.js"></script>
<script>
  // Set correct icon on load
  document.querySelector('[data-theme-toggle] i').setAttribute(
    'data-lucide', getTheme() === 'dark' ? 'sun' : 'moon'
  );
  if (window.lucide) lucide.createIcons();
</script>

</body>
</html>
