<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <script>
  (function() {
    const theme = localStorage.getItem('cloudtrips_theme') || 'dark';
    document.documentElement.classList.toggle('dark', theme === 'dark');
  })();
</script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot password · CloudTrips</title>
  <link href="/output.css" rel="stylesheet" />
</head>
<body class="min-h-full bg-white dark:bg-slate-950 text-slate-900 dark:text-slate-100">
  <div class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md rounded-2xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/80 p-6 shadow-2xl">

      <h1 class="text-2xl font-semibold tracking-tight">Forgot password</h1>
      <p class="mt-2 text-sm text-slate-500 dark:text-slate-500 dark:text-slate-400">Enter your email and we'll send you a reset link.</p>

      <form id="forgot-form" class="mt-6 space-y-4">
        <div>
          <label class="mb-2 block text-sm text-slate-600 dark:text-slate-300">Email</label>
          <input
            name="email"
            type="email"
            autocomplete="email"
            required
            class="w-full rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 px-4 py-3 text-slate-900 dark:text-slate-100 outline-none placeholder:text-slate-500 dark:text-slate-500 focus:border-indigo-500"
            placeholder="you@example.com"
          />
        </div>

        <div id="auth-error" class="min-h-[1.25rem] text-sm text-rose-400"></div>
        <div id="auth-success" class="min-h-[1.25rem] text-sm text-emerald-400 hidden"></div>

        <button
          type="submit"
          class="inline-flex w-full items-center justify-center rounded-xl bg-indigo-600 px-4 py-3 font-medium text-white transition hover:bg-indigo-500 disabled:opacity-60"
        >
          Send reset link
        </button>
      </form>

      <p class="mt-5 text-sm text-slate-500 dark:text-slate-500 dark:text-slate-400">
        Remembered it?
        <a href="/login.html" class="text-indigo-400 hover:text-indigo-300">Back to login</a>
      </p>

    </div>
  </div>

  <script>
    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.currentTarget;
      const email = form.querySelector('input[name="email"]').value.trim();
      const errorBox = document.getElementById('auth-error');
      const successBox = document.getElementById('auth-success');
      const submitBtn = form.querySelector('button[type="submit"]');

      errorBox.textContent = '';
      successBox.classList.add('hidden');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';

      try {
        const res = await fetch('/api/requestPasswordReset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (!res.ok) {
          errorBox.textContent = data.error || 'Something went wrong.';
          return;
        }

        // Always show success — don't reveal if email exists
        successBox.textContent = 'If that email is registered, you\'ll receive a reset link shortly.';
        successBox.classList.remove('hidden');
        form.reset();
      } catch {
        errorBox.textContent = 'Network error. Please try again.';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send reset link';
      }
    });
  </script>
  
<button onclick="toggleTheme()"
  data-theme-toggle
  class="fixed top-4 right-4 inline-flex items-center justify-center rounded-xl border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 p-2 text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 transition">
  <i data-lucide="sun" class="h-4 w-4"></i>
</button>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="/helpers.js"></script>
<script>
  // Set correct icon on load
  document.querySelector('[data-theme-toggle] i').setAttribute(
    'data-lucide', getTheme() === 'dark' ? 'sun' : 'moon'
  );
  if (window.lucide) lucide.createIcons();
</script>

</body>
</html>
