<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <script>
  (function() {
    const theme = localStorage.getItem('cloudtrips_theme') || 'dark';
    document.documentElement.classList.toggle('dark', theme === 'dark');
  })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify email · CloudTrips</title>
  <meta name="description" content="Verify your CloudTrips email address.">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2563eb">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/icons/favicon.ico">
  <link href="/output.css" rel="stylesheet" />
</head>
<body class="min-h-full bg-white dark:bg-slate-950 text-slate-900 dark:text-slate-100">
  <div class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md rounded-2xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/80 p-8 shadow-2xl text-center">

      <!-- Icon -->
      <div id="verify-icon" class="mx-auto mb-5 flex h-14 w-14 items-center justify-center rounded-2xl bg-primary-50 dark:bg-primary-500/10 text-primary-600 dark:text-primary-400">
        <i data-lucide="mail" class="h-7 w-7"></i>
      </div>

      <h1 id="verify-title" class="text-2xl font-semibold tracking-tight">Check your email</h1>
      <p id="verify-message" class="mt-3 text-sm text-slate-500 dark:text-slate-400 leading-relaxed">
        We've sent a verification link to <span id="verify-email" class="font-medium text-slate-700 dark:text-slate-200"></span>.
        Click the link in the email to activate your account.
      </p>

      <div id="verify-error" class="hidden mt-4 rounded-xl border border-rose-200 dark:border-rose-500/20 bg-rose-50 dark:bg-rose-500/10 px-4 py-3 text-sm text-rose-600 dark:text-rose-400"></div>
      <div id="verify-success" class="hidden mt-4 rounded-xl border border-emerald-200 dark:border-emerald-500/20 bg-emerald-50 dark:bg-emerald-500/10 px-4 py-3 text-sm text-emerald-700 dark:text-emerald-400"></div>

      <!-- Resend -->
      <div id="resend-section" class="mt-6">
        <p class="text-sm text-slate-400 dark:text-slate-500">Didn't get it?</p>
        <button id="resend-btn" onclick="resendVerification()"
          class="mt-2 inline-flex items-center gap-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 px-4 py-2 text-sm font-medium text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-800 transition">
          <i data-lucide="refresh-cw" class="h-4 w-4"></i>
          Resend verification email
        </button>
      </div>

      <!-- Token verification state (when arriving via link) -->
      <div id="token-section" class="hidden mt-6">
        <div id="token-loading" class="flex items-center justify-center gap-2 text-sm text-slate-500">
          <div class="h-4 w-4 animate-spin rounded-full border-2 border-slate-300 border-t-primary-500"></div>
          Verifying your email…
        </div>
      </div>

      <p class="mt-6 text-sm text-slate-400 dark:text-slate-500">
        <a href="/login.html" class="text-indigo-400 hover:text-indigo-300">← Back to login</a>
      </p>
    </div>
  </div>

<script src="/state.js"></script>
<script src="/helpers.js"></script>
<script src="/api.js"></script>
<script src="https://unpkg.com/lucide@latest" defer></script>

<script>
const params = new URLSearchParams(window.location.search);
const token = params.get('token');
const email = params.get('email');

function showError(msg) {
  const el = document.getElementById('verify-error');
  el.textContent = msg;
  el.classList.remove('hidden');
}

function showSuccess(msg) {
  const el = document.getElementById('verify-success');
  el.textContent = msg;
  el.classList.remove('hidden');
}

async function verifyToken() {
  document.getElementById('token-section').classList.remove('hidden');
  document.getElementById('resend-section').classList.add('hidden');
  document.getElementById('verify-title').textContent = 'Verifying your email…';
  document.getElementById('verify-message').classList.add('hidden');

  try {
    await apiFetch('/api/verifyEmail', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token })
    });

    document.getElementById('verify-icon').innerHTML = '<i data-lucide="circle-check" class="h-7 w-7"></i>';
    document.getElementById('verify-icon').className = 'mx-auto mb-5 flex h-14 w-14 items-center justify-center rounded-2xl bg-emerald-50 dark:bg-emerald-500/10 text-emerald-600 dark:text-emerald-400';
    document.getElementById('verify-title').textContent = 'Email verified!';
    document.getElementById('token-section').classList.add('hidden');
    showSuccess('Your email has been verified. You can now log in.');

    if (window.lucide) lucide.createIcons();

    setTimeout(() => { window.location.href = '/login.html'; }, 2000);
  } catch (err) {
    document.getElementById('verify-title').textContent = 'Verification failed';
    document.getElementById('token-section').classList.add('hidden');
    document.getElementById('resend-section').classList.remove('hidden');
    showError(err.message || 'Invalid or expired verification link.');
  }
}

async function resendVerification() {
  const btn = document.getElementById('resend-btn');
  btn.disabled = true;
  btn.textContent = 'Sending…';
  document.getElementById('verify-error').classList.add('hidden');
  document.getElementById('verify-success').classList.add('hidden');

  try {
    await apiFetch('/api/resendVerification', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' }
    });
    showSuccess('Verification email sent — check your inbox.');
  } catch (err) {
    showError(err.message || 'Failed to resend. Please try again.');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i data-lucide="refresh-cw" class="h-4 w-4"></i> Resend verification email';
    if (window.lucide) lucide.createIcons();
  }
}

// Show email if passed via query param
if (email) {
  document.getElementById('verify-email').textContent = email;
} else {
  document.getElementById('verify-message').textContent = 'Click the link in the verification email to activate your account.';
}

// If token in URL — verify immediately
if (token) {
  verifyToken();
}

document.addEventListener('DOMContentLoaded', () => {
  if (window.lucide) lucide.createIcons();
});
</script>
</body>
</html>
